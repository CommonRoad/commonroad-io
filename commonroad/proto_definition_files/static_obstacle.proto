syntax = "proto3";

package commonroad;

import "obstacle.proto";

message StaticObstacle {
    uint32 static_obstacle_id = 1;
    ObstacleType obstacle_type = 2;
    Shape shape = 3;
    State initial_state = 4;
    repeated uint32 initial_center_lanelet_ids = 5;
    repeated uint32 initial_shape_lanelet_ids = 6;
    optional SignalState initial_signal_state = 7;
    repeated SignalState signal_series = 8;
}