syntax = "proto2";

package commonroad;

import "util.proto";

message TrafficSignElement {
    required uint32 traffic_sign_element_id = 1;
    repeated string additional_values = 2;
}

message TrafficSign {
    required uint32  traffic_sign_id = 1;
    repeated TrafficSignElement traffic_sign_elements = 2;
    optional Point position = 3;
    optional bool virtual = 4;
}